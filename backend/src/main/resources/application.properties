# Datasource - MS SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=Taskio;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Elem123.
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Server
server.port=8080
server.servlet.context-path=/api

# JWT
jwt.secret=TaskioSecretKey2024VeryLongAndSecureKeyForJWTTokenGeneration
jwt.expiration=86400000

# Logging
logging.level.com.taskio=DEBUG
logging.level.org.springframework.security=DEBUG
